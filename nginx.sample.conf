# Cấu hình Nginx mẫu cho 2 Dự án hoàn toàn độc lập chạy trên 1 VPS

# SERVER 1: MYCAFE
server {
    listen 80;
    server_name mycafe.yourdomain.com; # Thay bằng domain của Mycafe

    location / {
        proxy_pass http://localhost:5001; # Trỏ về api-mycafe
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# SERVER 2: DỰ ÁN MỚI
server {
    listen 80;
    server_name newproject.yourdomain.com; # Thay bằng domain của Dự án mới

    location / {
        proxy_pass http://localhost:5002; # Trỏ về api-otherstore
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
