name: Keep Backend Alive

on:
  schedule:
    # Chạy mỗi 10 phút, 24/7 để giữ cả Render và Aiven luôn thức
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping All Services
        run: |
          # Ping Render Backend & Aiven DB (Đánh thức cả 2 ông)
          curl -I https://mycafe-backend-prx3.onrender.com/ping/db
          # Ping Vercel Frontend
          curl -I https://mycafe-omega.vercel.app/
          echo "Pings completed successfully at $(date)!"
